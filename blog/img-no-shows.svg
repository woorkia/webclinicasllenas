<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="50%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="300" cy="200" r="3"/>
    <circle cx="100" cy="300" r="3"/><circle cx="200" cy="300" r="3"/>
    <circle cx="900" cy="450" r="3"/><circle cx="1000" cy="450" r="3"/><circle cx="1100" cy="450" r="3"/>
    <circle cx="900" cy="550" r="3"/><circle cx="1000" cy="550" r="3"/><circle cx="1100" cy="550" r="3"/>
  </g>
  <!-- Glow -->
  <ellipse cx="900" cy="200" rx="400" ry="300" fill="rgba(52,211,153,0.15)"/>
  <!-- Calendar mockup card -->
  <rect x="680" y="80" width="420" height="460" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Calendar header -->
  <rect x="680" y="80" width="420" height="70" rx="24" fill="rgba(255,255,255,0.1)"/>
  <rect x="680" y="120" width="420" height="30" fill="rgba(255,255,255,0.1)"/>
  <text x="890" y="122" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="700" fill="white">Abril 2026</text>
  <!-- Calendar grid -->
  <g font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <text x="722" y="180">L</text><text x="782" y="180">M</text><text x="842" y="180">X</text>
    <text x="902" y="180">J</text><text x="962" y="180">V</text><text x="1022" y="180">S</text><text x="1082" y="180">D</text>
  </g>
  <!-- Calendar days -->
  <g font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    <text x="722" y="225">1</text><text x="782" y="225">2</text><text x="842" y="225">3</text>
    <text x="902" y="225">4</text><text x="962" y="225">5</text><text x="1022" y="225">6</text><text x="1082" y="225">7</text>
    <text x="722" y="270">8</text><text x="782" y="270">9</text><text x="842" y="270">10</text>
    <text x="902" y="270">11</text><text x="962" y="270">12</text><text x="1022" y="270">13</text><text x="1082" y="270">14</text>
    <text x="722" y="315">15</text><text x="782" y="315">16</text>
  </g>
  <!-- No-show markers (red X) -->
  <g fill="rgba(239,68,68,0.9)">
    <rect x="877" y="248" width="50" height="50" rx="10"/>
    <rect x="937" y="248" width="50" height="50" rx="10"/>
    <rect x="757" y="293" width="50" height="50" rx="10"/>
  </g>
  <g fill="white" font-family="system-ui" font-size="22" font-weight="700" text-anchor="middle">
    <text x="902" y="280">✕</text>
    <text x="962" y="280">✕</text>
    <text x="782" y="325">✕</text>
  </g>
  <!-- Confirmed marker (green check) -->
  <g fill="rgba(52,211,153,0.9)">
    <rect x="817" y="248" width="50" height="50" rx="10"/>
    <rect x="697" y="293" width="50" height="50" rx="10"/>
    <rect x="817" y="293" width="50" height="50" rx="10"/>
  </g>
  <g fill="white" font-family="system-ui" font-size="22" font-weight="700" text-anchor="middle">
    <text x="842" y="280">✓</text>
    <text x="722" y="325">✓</text>
    <text x="842" y="325">✓</text>
  </g>
  <!-- Stat badge -->
  <rect x="700" y="400" width="380" height="110" rx="16" fill="rgba(0,0,0,0.3)"/>
  <text x="890" y="440" text-anchor="middle" font-family="system-ui" font-size="42" font-weight="900" fill="white">-52%</text>
  <text x="890" y="475" text-anchor="middle" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.7)">reducción de no-shows con WhatsApp</text>
  <!-- Left text -->
  <text x="80" y="200" font-family="system-ui" font-size="16" font-weight="600" fill="rgba(52,211,153,0.9)" letter-spacing="3">AUTOMATIZACIÓN · CLÍNICAS</text>
  <text x="80" y="270" font-family="system-ui" font-size="58" font-weight="900" fill="white">Reduce los</text>
  <text x="80" y="345" font-family="system-ui" font-size="58" font-weight="900" fill="white">no-shows</text>
  <text x="80" y="420" font-family="system-ui" font-size="58" font-weight="900" fill="rgba(52,211,153,0.95)">un 50%</text>
  <text x="80" y="490" font-family="system-ui" font-size="18" fill="rgba(255,255,255,0.65)" font-weight="400">Con recordatorios automáticos por WhatsApp</text>
  <!-- Logo badge -->
  <rect x="80" y="555" width="185" height="44" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="172" y="583" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
