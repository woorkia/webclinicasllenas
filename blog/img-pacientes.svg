<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="180" rx="450" ry="320" fill="rgba(99,102,241,0.2)"/>
  <ellipse cx="300" cy="500" rx="350" ry="220" fill="rgba(79,70,229,0.15)"/>
  <!-- Patient cards -->
  <rect x="660" y="70" width="460" height="130" rx="18" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="710" cy="135" r="28" fill="rgba(99,102,241,0.4)"/>
  <text x="710" y="141" text-anchor="middle" font-family="system-ui" font-size="18" fill="white">MR</text>
  <text x="752" y="120" font-family="system-ui" font-size="15" font-weight="700" fill="white">María R.</text>
  <text x="752" y="140" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">Última visita: hace 8 meses</text>
  <rect x="752" y="150" width="110" height="24" rx="12" fill="rgba(239,68,68,0.25)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="807" y="167" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(252,165,165,1)">Paciente dormida</text>

  <rect x="660" y="215" width="460" height="130" rx="18" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="710" cy="280" r="28" fill="rgba(79,70,229,0.4)"/>
  <text x="710" y="286" text-anchor="middle" font-family="system-ui" font-size="18" fill="white">JL</text>
  <text x="752" y="265" font-family="system-ui" font-size="15" font-weight="700" fill="white">Juan L.</text>
  <text x="752" y="285" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">Última visita: hace 11 meses</text>
  <rect x="752" y="295" width="110" height="24" rx="12" fill="rgba(239,68,68,0.25)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="807" y="312" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(252,165,165,1)">Paciente dormido</text>

  <!-- Arrow / reactivation -->
  <text x="895" y="370" text-anchor="middle" font-family="system-ui" font-size="36" fill="rgba(167,243,208,0.9)">↓</text>
  <text x="895" y="395" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.4)">reactivación automática</text>

  <rect x="660" y="410" width="460" height="130" rx="18" fill="rgba(16,185,129,0.12)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <circle cx="710" cy="475" r="28" fill="rgba(16,185,129,0.3)"/>
  <text x="710" y="481" text-anchor="middle" font-family="system-ui" font-size="18" fill="white">MR</text>
  <text x="752" y="460" font-family="system-ui" font-size="15" font-weight="700" fill="white">María R.</text>
  <text x="752" y="480" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">Cita confirmada para el lunes</text>
  <rect x="752" y="490" width="100" height="24" rx="12" fill="rgba(16,185,129,0.25)" stroke="rgba(52,211,153,0.4)" stroke-width="1"/>
  <text x="802" y="507" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="rgba(110,231,183,1)">Reactivada ✓</text>

  <!-- Left content -->
  <text x="80" y="190" font-family="system-ui" font-size="15" font-weight="600" fill="rgba(196,181,253,0.9)" letter-spacing="3">REACTIVACIÓN DE PACIENTES</text>
  <text x="80" y="265" font-family="system-ui" font-size="52" font-weight="900" fill="white">Pacientes</text>
  <text x="80" y="330" font-family="system-ui" font-size="52" font-weight="900" fill="white">dormidos:</text>
  <text x="80" y="395" font-family="system-ui" font-size="52" font-weight="900" fill="rgba(196,181,253,0.95)">dinero perdido</text>
  <text x="80" y="450" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.55)">Cómo recuperarlos con WhatsApp</text>
  <!-- Stats -->
  <rect x="80" y="480" width="500" height="90" rx="16" fill="rgba(0,0,0,0.25)"/>
  <text x="150" y="520" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="900" fill="white">40%</text>
  <text x="150" y="550" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">no vuelven</text>
  <text x="310" y="520" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="900" fill="rgba(167,243,208,1)">7x</text>
  <text x="310" y="550" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">más barato reactivar</text>
  <text x="470" y="520" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="900" fill="rgba(196,181,253,1)">34%</text>
  <text x="470" y="550" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">tasa de respuesta</text>
  <!-- Logo badge -->
  <rect x="80" y="585" width="185" height="38" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="172" y="609" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
