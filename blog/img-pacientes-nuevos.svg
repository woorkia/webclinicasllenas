  <rect x="680" y="470" width="420" height="65" rx="14" fill="rgba(0,0,0,0.25)"/>
  <text x="890" y="496" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">CANALES DE CAPTACIÓN</text>
  <circle cx="730" cy="523" r="14" fill="rgba(74,222,128,0.3)" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
  <text x="730" y="528" text-anchor="middle" font-family="system-ui" font-size="14" fill="white">📱</text>
  <text x="755" y="528" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.7)">WhatsApp</text>
  <circle cx="850" cy="523" r="14" fill="rgba(74,222,128,0.3)" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
  <text x="850" y="528" text-anchor="middle" font-family="system-ui" font-size="14" fill="white">⭐</text>
  <text x="875" y="528" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.7)">Reseñas</text>
  <circle cx="970" cy="523" r="14" fill="rgba(74,222,128,0.3)" stroke="rgba(74,222,128,0.5)" stroke-width="1"/>
  <text x="970" y="528" text-anchor="middle" font-family="system-ui" font-size="14" fill="white">🔗</text>
  <text x="995" y="528" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.7)">Referidos</text>
  <!-- Left content -->
  <text x="80" y="190" font-family="system-ui" font-size="15" font-weight="600" fill="rgba(134,239,172,0.9)" letter-spacing="3">CRECIMIENTO · CLÍNICAS</text>
  <text x="80" y="265" font-family="system-ui" font-size="54" font-weight="900" fill="white">Consigue</text>
  <text x="80" y="335" font-family="system-ui" font-size="54" font-weight="900" fill="white">más pacientes</text>
  <text x="80" y="405" font-family="system-ui" font-size="54" font-weight="900" fill="rgba(134,239,172,0.95)">nuevos</text>
  <text x="80" y="458" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">Estrategias probadas para llenar</text>
  <text x="80" y="480" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">tu agenda sin depender de publicidad</text>
  <!-- Stats -->
  <text x="80" y="530" font-family="system-ui" font-size="40" font-weight="900" fill="white">+35%</text>
  <text x="80" y="556" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">más pacientes en 90 días</text>
  <!-- Logo badge -->
  <rect x="80" y="578" width="185" height="40" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="172" y="603" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
