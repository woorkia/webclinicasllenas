<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052E16"/>
      <stop offset="50%" stop-color="#14532D"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.07)">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="300" cy="200" r="3"/>
    <circle cx="100" cy="300" r="3"/><circle cx="200" cy="300" r="3"/>
    <circle cx="900" cy="500" r="3"/><circle cx="1000" cy="500" r="3"/><circle cx="1100" cy="500" r="3"/>
    <circle cx="950" cy="560" r="3"/><circle cx="1050" cy="560" r="3"/>
  </g>
  <!-- Glow -->
  <ellipse cx="920" cy="220" rx="400" ry="280" fill="rgba(74,222,128,0.1)"/>
  <!-- Chart card -->
  <rect x="660" y="70" width="460" height="490" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Chart title -->
  <rect x="660" y="70" width="460" height="55" rx="20" fill="rgba(255,255,255,0.08)"/>
  <rect x="660" y="100" width="460" height="25" fill="rgba(255,255,255,0.08)"/>
  <text x="890" y="104" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="rgba(255,255,255,0.8)">Nuevos Pacientes / Mes</text>
  <!-- Chart grid lines -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="700" y1="430" x2="1090" y2="430"/>
    <line x1="700" y1="370" x2="1090" y2="370"/>
    <line x1="700" y1="310" x2="1090" y2="310"/>
    <line x1="700" y1="250" x2="1090" y2="250"/>
    <line x1="700" y1="190" x2="1090" y2="190"/>
  </g>
  <!-- Y-axis labels -->
  <g font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="end">
    <text x="695" y="433">0</text>
    <text x="695" y="373">10</text>
    <text x="695" y="313">20</text>
    <text x="695" y="253">30</text>
    <text x="695" y="193">40</text>
  </g>
  <!-- Bars (growing trend) -->
  <rect x="716" y="408" width="38" height="22" rx="5" fill="url(#bar)" opacity="0.5"/>
  <rect x="770" y="388" width="38" height="42" rx="5" fill="url(#bar)" opacity="0.6"/>
  <rect x="824" y="370" width="38" height="60" rx="5" fill="url(#bar)" opacity="0.7"/>
  <rect x="878" y="350" width="38" height="80" rx="5" fill="url(#bar)" opacity="0.8"/>
  <rect x="932" y="310" width="38" height="120" rx="5" fill="url(#bar)" opacity="0.9"/>
  <rect x="986" y="250" width="38" height="180" rx="5" fill="url(#bar2)"/>
  <rect x="1040" y="195" width="38" height="235" rx="5" fill="url(#bar2)"/>
  <!-- X-axis labels -->
  <g font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">
