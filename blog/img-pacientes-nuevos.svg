    <text x="789" y="450">Nov</text>
    <text x="843" y="450">Dic</text>
    <text x="897" y="450">Ene</text>
    <text x="951" y="450">Feb</text>
    <text x="1005" y="450">Mar</text>
    <text x="1059" y="450">Abr</text>
  </g>
  <!-- Trend arrow up -->
  <path d="M716 408 L770 388 L824 370 L878 350 L932 310 L986 250 L1059 195" fill="none" stroke="rgba(74,222,128,0.6)" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Last bar highlight badge -->
  <rect x="1025" y="163" width="80" height="28" rx="14" fill="rgba(74,222,128,0.9)"/>
  <text x="1065" y="182" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="800" fill="#052E16">+43 pac.</text>
