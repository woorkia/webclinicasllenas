<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.07)">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="300" cy="200" r="3"/>
    <circle cx="100" cy="300" r="3"/><circle cx="200" cy="300" r="3"/>
    <circle cx="900" cy="450" r="3"/><circle cx="1000" cy="450" r="3"/><circle cx="1100" cy="450" r="3"/>
    <circle cx="900" cy="550" r="3"/><circle cx="1000" cy="550" r="3"/><circle cx="1100" cy="550" r="3"/>
  </g>
  <!-- Glow -->
  <ellipse cx="920" cy="200" rx="420" ry="300" fill="rgba(167,139,250,0.12)"/>
  <!-- Document card -->
  <rect x="680" y="70" width="420" height="490" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Doc header -->
  <rect x="680" y="70" width="420" height="55" rx="20" fill="rgba(139,92,246,0.3)"/>
  <rect x="680" y="100" width="420" height="25" fill="rgba(139,92,246,0.3)"/>
  <text x="890" y="104" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="white">CONSENTIMIENTO INFORMADO</text>
  <!-- Document lines -->
  <g fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <line x1="710" y1="155" x2="1070" y2="155"/>
    <line x1="710" y1="180" x2="1070" y2="180"/>
    <line x1="710" y1="205" x2="1070" y2="205"/>
    <line x1="710" y1="230" x2="980" y2="230"/>
  </g>
  <!-- Text lines filled -->
  <rect x="710" y="145" width="360" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="710" y="168" width="340" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="710" y="191" width="355" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="710" y="214" width="200" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Procedure section -->
  <rect x="710" y="240" width="360" height="70" rx="10" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="724" y="262" font-family="system-ui" font-size="11" font-weight="700" fill="rgba(196,181,253,0.9)">PROCEDIMIENTO</text>
  <rect x="724" y="270" width="180" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="724" y="283" width="220" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="724" y="296" width="160" height="7" rx="3" fill="rgba(255,255,255,0.15)"/>
  <!-- More text lines -->
  <rect x="710" y="330" width="350" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="710" y="348" width="320" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="710" y="366" width="340" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="710" y="384" width="180" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Signature area -->
  <rect x="710" y="415" width="360" height="100" rx="12" fill="rgba(0,0,0,0.25)"/>
  <text x="890" y="445" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.4)">Firma del paciente</text>
  <!-- Signature SVG path (cursive) -->
  <path d="M740 480 Q760 455 790 475 Q820 490 850 460 Q870 445 900 465 Q920 475 940 458" fill="none" stroke="rgba(196,181,253,0.9)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="730" y1="495" x2="970" y2="495" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Green checkmark badge -->
  <circle cx="1040" cy="490" r="24" fill="rgba(52,211,153,0.9)"/>
  <text x="1040" y="498" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">✓</text>
  <!-- Digital badge -->
  <rect x="710" y="530" width="120" height="28" rx="14" fill="rgba(139,92,246,0.5)" stroke="rgba(196,181,253,0.4)" stroke-width="1"/>
  <text x="770" y="549" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="white">100% Digital</text>
  <!-- Left content -->
  <text x="80" y="190" font-family="system-ui" font-size="15" font-weight="600" fill="rgba(196,181,253,0.9)" letter-spacing="3">GESTIÓN · CLÍNICAS</text>
  <text x="80" y="265" font-family="system-ui" font-size="54" font-weight="900" fill="white">Consent.</text>
  <text x="80" y="335" font-family="system-ui" font-size="54" font-weight="900" fill="white">informados</text>
  <text x="80" y="405" font-family="system-ui" font-size="54" font-weight="900" fill="rgba(196,181,253,0.95)">digitales</text>
  <text x="80" y="460" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">Firma digital, almacenamiento seguro y</text>
  <text x="80" y="483" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">cumplimiento RGPD desde el móvil</text>
  <!-- Stats -->
  <text x="80" y="535" font-family="system-ui" font-size="38" font-weight="900" fill="white">0</text>
  <text x="120" y="535" font-family="system-ui" font-size="38" font-weight="900" fill="rgba(196,181,253,0.95)">papel</text>
  <text x="80" y="558" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">100% digital · RGPD · Firma electrónica</text>
  <!-- Logo badge -->
  <rect x="80" y="578" width="185" height="40" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="172" y="603" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
