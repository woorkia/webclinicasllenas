<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="60%" stop-color="#1E4FC9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="950" cy="150" rx="500" ry="350" fill="rgba(99,102,241,0.2)"/>
  <ellipse cx="200" cy="550" rx="300" ry="200" fill="rgba(37,99,235,0.15)"/>
  <!-- Phone mockup -->
  <rect x="700" y="60" width="280" height="510" rx="32" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Phone screen -->
  <rect x="714" y="90" width="252" height="450" rx="20" fill="#075E54"/>
  <!-- WA Header -->
  <rect x="714" y="90" width="252" height="60" rx="20" fill="#075E54"/>
  <rect x="714" y="120" width="252" height="30" fill="#075E54"/>
  <circle cx="745" cy="121" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="770" y="127" font-family="system-ui" font-size="13" font-weight="700" fill="white">Clínica Sonriente</text>
  <text x="770" y="142" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)">en línea</text>
  <!-- Dynamic island -->
  <rect x="800" y="96" width="56" height="14" rx="7" fill="rgba(0,0,0,0.5)"/>
  <!-- Chat bubbles -->
  <rect x="726" y="165" width="190" height="52" rx="10" fill="white"/>
  <text x="736" y="186" font-family="system-ui" font-size="11" fill="#333">Hola María, tienes cita</text>
  <text x="736" y="200" font-family="system-ui" font-size="11" fill="#333">el lunes 14 a las 10:00.</text>
  <text x="874" y="208" font-family="system-ui" font-size="9" fill="#aaa">10:23 ✓✓</text>
  <!-- Bot bubble -->
  <rect x="726" y="228" width="175" height="40" rx="10" fill="white"/>
  <text x="736" y="245" font-family="system-ui" font-size="11" fill="#333">¿Confirmas asistencia?</text>
  <text x="874" y="260" font-family="system-ui" font-size="9" fill="#aaa">10:23</text>
  <!-- User response -->
  <rect x="778" y="280" width="150" height="35" rx="10" fill="#DCF8C6"/>
  <text x="788" y="302" font-family="system-ui" font-size="11" fill="#333">Sí, confirmo ✓</text>
  <text x="886" y="308" font-family="system-ui" font-size="9" fill="#aaa">10:24</text>
  <!-- Reminder bubble -->
  <rect x="726" y="328" width="210" height="64" rx="10" fill="white"/>
  <text x="736" y="347" font-family="system-ui" font-size="11" fill="#333">Te recordamos: hoy</text>
  <text x="736" y="362" font-family="system-ui" font-size="11" fill="#333">tienes cita a las 10:00.</text>
  <text x="736" y="377" font-family="system-ui" font-size="11" fill="#2563EB">Te esperamos.</text>
  <text x="897" y="384" font-family="system-ui" font-size="9" fill="#aaa">9:00</text>
  <!-- Input bar -->
  <rect x="714" y="490" width="252" height="50" rx="0" fill="rgba(255,255,255,0.1)"/>
  <rect x="726" y="500" width="180" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  <text x="810" y="519" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">Escribe un mensaje</text>
  <circle cx="948" cy="515" r="14" fill="#25D366"/>
  <!-- Left content -->
  <text x="80" y="190" font-family="system-ui" font-size="15" font-weight="600" fill="rgba(147,197,253,0.9)" letter-spacing="3">GUÍA COMPLETA 2026</text>
  <text x="80" y="265" font-family="system-ui" font-size="55" font-weight="900" fill="white">Recordatorios</text>
  <text x="80" y="335" font-family="system-ui" font-size="55" font-weight="900" fill="white">automáticos</text>
  <text x="80" y="405" font-family="system-ui" font-size="55" font-weight="900" fill="rgba(147,197,253,0.95)">WhatsApp</text>
  <!-- Comparison pills -->
  <rect x="80" y="435" width="100" height="34" rx="17" fill="rgba(37,99,235,0.4)" stroke="rgba(147,197,253,0.3)" stroke-width="1"/>
  <text x="130" y="457" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">WhatsApp</text>
  <rect x="195" y="435" width="65" height="34" rx="17" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="227" y="457" text-anchor="middle" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">SMS</text>
  <rect x="275" y="435" width="65" height="34" rx="17" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="307" y="457" text-anchor="middle" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">Email</text>
  <!-- Stats row -->
  <text x="80" y="520" font-family="system-ui" font-size="40" font-weight="900" fill="white">98%</text>
  <text x="80" y="550" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.55)">tasa apertura</text>
  <text x="220" y="520" font-family="system-ui" font-size="40" font-weight="900" fill="rgba(52,211,153,0.95)">45%</text>
  <text x="220" y="550" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.55)">tasa respuesta</text>
  <text x="360" y="520" font-family="system-ui" font-size="40" font-weight="900" fill="rgba(147,197,253,0.95)">3x</text>
  <text x="360" y="550" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.55)">más conversión</text>
  <!-- Logo badge -->
  <rect x="80" y="568" width="185" height="44" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="172" y="596" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
