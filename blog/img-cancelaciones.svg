<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#431407"/>
      <stop offset="50%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.07)">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="300" cy="200" r="3"/>
    <circle cx="100" cy="300" r="3"/><circle cx="200" cy="300" r="3"/>
    <circle cx="900" cy="480" r="3"/><circle cx="1000" cy="480" r="3"/><circle cx="1100" cy="480" r="3"/>
    <circle cx="900" cy="560" r="3"/><circle cx="1000" cy="560" r="3"/><circle cx="1100" cy="560" r="3"/>
  </g>
  <!-- Glow -->
  <ellipse cx="920" cy="200" rx="420" ry="300" fill="rgba(251,146,60,0.1)"/>
  <!-- Calendar card -->
  <rect x="670" y="65" width="450" height="500" rx="22" fill="url(#card)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <!-- Calendar header -->
  <rect x="670" y="65" width="450" height="65" rx="22" fill="rgba(234,88,12,0.3)"/>
  <rect x="670" y="100" width="450" height="30" fill="rgba(234,88,12,0.3)"/>
  <text x="895" y="105" text-anchor="middle" font-family="system-ui" font-size="17" font-weight="700" fill="white">Mayo 2026</text>
  <!-- Day headers -->
  <g font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    <text x="720" y="155">L</text><text x="784" y="155">M</text><text x="848" y="155">X</text>
    <text x="912" y="155">J</text><text x="976" y="155">V</text><text x="1040" y="155">S</text><text x="1080" y="155">D</text>
  </g>
  <!-- Row 1 days -->
  <g font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.65)" text-anchor="middle">
    <text x="720" y="200">1</text>
    <text x="784" y="200">2</text>
    <text x="848" y="200">3</text>
    <text x="912" y="200">4</text>
    <text x="976" y="200">5</text>
    <text x="1040" y="200">6</text>
    <text x="1080" y="200">7</text>
  </g>
  <!-- Cancellation markers (orange warning) -->
  <rect x="760" y="178" width="48" height="48" rx="10" fill="rgba(234,88,12,0.85)"/>
  <text x="784" y="209" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">!</text>
  <rect x="952" y="178" width="48" height="48" rx="10" fill="rgba(234,88,12,0.85)"/>
  <text x="976" y="209" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">!</text>
  <!-- Row 2 -->
  <g font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.65)" text-anchor="middle">
    <text x="720" y="255">8</text>
    <text x="784" y="255">9</text>
    <text x="848" y="255">10</text>
    <text x="912" y="255">11</text>
    <text x="976" y="255">12</text>
    <text x="1040" y="255">13</text>
    <text x="1080" y="255">14</text>
  </g>
  <!-- More cancellation + confirmed -->
  <rect x="696" y="233" width="48" height="48" rx="10" fill="rgba(234,88,12,0.85)"/>
  <text x="720" y="264" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">!</text>
  <rect x="824" y="233" width="48" height="48" rx="10" fill="rgba(52,211,153,0.85)"/>
  <text x="848" y="264" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">✓</text>
  <rect x="888" y="233" width="48" height="48" rx="10" fill="rgba(52,211,153,0.85)"/>
  <text x="912" y="264" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">✓</text>
  <rect x="1016" y="233" width="48" height="48" rx="10" fill="rgba(234,88,12,0.85)"/>
  <text x="1040" y="264" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">!</text>
  <!-- Row 3 -->
  <g font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.65)" text-anchor="middle">
    <text x="720" y="310">15</text>
    <text x="784" y="310">16</text>
    <text x="848" y="310">17</text>
  </g>
  <rect x="696" y="288" width="48" height="48" rx="10" fill="rgba(52,211,153,0.85)"/>
  <text x="720" y="319" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">✓</text>
  <rect x="760" y="288" width="48" height="48" rx="10" fill="rgba(52,211,153,0.85)"/>
  <text x="784" y="319" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="900" fill="white">✓</text>
  <!-- Legend -->
  <rect x="690" y="358" width="190" height="36" rx="10" fill="rgba(234,88,12,0.2)" stroke="rgba(234,88,12,0.4)" stroke-width="1"/>
  <rect x="706" y="370" width="14" height="14" rx="3" fill="rgba(234,88,12,0.85)"/>
  <text x="730" y="381" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.75)">Cancelación sin aviso</text>
  <rect x="900" y="358" width="190" height="36" rx="10" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.35)" stroke-width="1"/>
  <rect x="916" y="370" width="14" height="14" rx="3" fill="rgba(52,211,153,0.85)"/>
  <text x="940" y="381" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.75)">Cita confirmada</text>
  <!-- Alert box -->
  <rect x="690" y="410" width="400" height="120" rx="16" fill="rgba(0,0,0,0.3)"/>
  <text x="890" y="445" text-anchor="middle" font-family="system-ui" font-size="13" fill="rgba(255,200,100,0.8)">COSTE PROMEDIO POR CANCELACIÓN</text>
  <text x="890" y="493" text-anchor="middle" font-family="system-ui" font-size="46" font-weight="900" fill="white">85€</text>
  <text x="890" y="520" text-anchor="middle" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.55)">por cita perdida sin aviso previo</text>
  <!-- Left content -->
  <text x="80" y="190" font-family="system-ui" font-size="15" font-weight="600" fill="rgba(251,146,60,0.9)" letter-spacing="3">AUTOMATIZACIÓN · CLÍNICAS</text>
  <text x="80" y="265" font-family="system-ui" font-size="54" font-weight="900" fill="white">Reduce las</text>
  <text x="80" y="335" font-family="system-ui" font-size="54" font-weight="900" fill="white">cancelaciones</text>
  <text x="80" y="405" font-family="system-ui" font-size="54" font-weight="900" fill="rgba(251,146,60,0.95)">last-minute</text>
  <text x="80" y="458" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">Automatiza recordatorios y recupera</text>
  <text x="80" y="480" font-family="system-ui" font-size="17" fill="rgba(255,255,255,0.6)" font-weight="400">huecos con lista de espera WhatsApp</text>
  <!-- Stats -->
  <text x="80" y="530" font-family="system-ui" font-size="40" font-weight="900" fill="white">-60%</text>
  <text x="80" y="556" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">cancelaciones con sistema automático</text>
  <!-- Logo badge -->
  <rect x="80" y="578" width="185" height="40" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="172" y="603" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="800" fill="white">Clínicas Llenas</text>
</svg>
