<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08101A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E3A5F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E4FC9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow blob -->
  <ellipse cx="900" cy="200" rx="500" ry="350" fill="url(#blueGlow)"/>
  <ellipse cx="200" cy="500" rx="300" ry="200" fill="#10B981" fill-opacity="0.06"/>

  <!-- Grid dots -->
  <g fill="#334155" opacity="0.4">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/>
    <circle cx="1000" cy="400" r="2"/><circle cx="1080" cy="400" r="2"/><circle cx="1000" cy="480" r="2"/><circle cx="1080" cy="480" r="2"/>
    <circle cx="1000" cy="560" r="2"/><circle cx="1080" cy="560" r="2"/>
  </g>

  <!-- WhatsApp phone mockup (simplified) -->
  <rect x="780" y="80" width="340" height="480" rx="36" fill="#1a2d42" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="780" y="80" width="340" height="80" rx="36" fill="#1a2d42"/>
  <rect x="780" y="120" width="340" height="40" fill="#075E54"/>
  <rect x="790" y="175" width="200" height="16" rx="8" fill="#1E3A5F"/>
  <rect x="790" y="200" width="250" height="12" rx="6" fill="#1E3A5F"/>
  <rect x="868" y="225" width="172" height="40" rx="10" fill="#25D366" fill-opacity="0.2"/>
  <rect x="790" y="280" width="180" height="36" rx="8" fill="#1E3A5F"/>
  <rect x="790" y="325" width="220" height="12" rx="6" fill="#1E3A5F"/>
  <rect x="868" y="350" width="152" height="40" rx="10" fill="#25D366" fill-opacity="0.25"/>
  <!-- Dynamic island -->
  <rect x="870" y="92" width="100" height="18" rx="9" fill="#08101A"/>

  <!-- Left content -->
  <!-- Eyebrow pill -->
  <rect x="80" y="140" width="220" height="34" rx="17" fill="#2563EB" fill-opacity="0.15"/>
  <circle cx="103" cy="157" r="6" fill="#10B981"/>
  <text x="118" y="162" font-family="system-ui,sans-serif" font-weight="700" font-size="13" fill="#10B981" letter-spacing="1">CLÍNICAS PRIVADAS · ESPAÑA</text>

  <!-- Main headline -->
  <text x="80" y="250" font-family="system-ui,sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">Tu clínica</text>
  <text x="80" y="335" font-family="system-ui,sans-serif" font-weight="900" font-size="72" fill="white" letter-spacing="-2">llena, sin</text>
  <text x="80" y="420" font-family="system-ui,sans-serif" font-weight="900" font-size="72" fill="#2563EB" letter-spacing="-2">esfuerzo extra.</text>

  <!-- Sub -->
  <text x="80" y="470" font-family="system-ui,sans-serif" font-weight="400" font-size="22" fill="#64748B">Automatización WhatsApp · Agendamiento 24/7 · Sin personal extra</text>

  <!-- Bottom brand badge -->
  <rect x="80" y="530" width="200" height="44" rx="12" fill="url(#pill)"/>
  <text x="180" y="558" font-family="system-ui,sans-serif" font-weight="800" font-size="18" fill="white" text-anchor="middle">Clínicas Llenas</text>

  <!-- Stats -->
  <text x="320" y="548" font-family="system-ui,sans-serif" font-weight="700" font-size="28" fill="white">+87</text>
  <text x="320" y="572" font-family="system-ui,sans-serif" font-weight="400" font-size="14" fill="#64748B">clínicas activas</text>
  <text x="460" y="548" font-family="system-ui,sans-serif" font-weight="700" font-size="28" fill="#10B981">-52%</text>
  <text x="460" y="572" font-family="system-ui,sans-serif" font-weight="400" font-size="14" fill="#64748B">no-shows</text>
  <text x="590" y="548" font-family="system-ui,sans-serif" font-weight="700" font-size="28" fill="white">4.9★</text>
  <text x="590" y="572" font-family="system-ui,sans-serif" font-weight="400" font-size="14" fill="#64748B">valoración media</text>
