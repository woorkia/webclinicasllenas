name: 📝 Auto-blog diario

on:
  schedule:
    # Cada día a las 9:00 AM hora de España (UTC+2 en verano = 7:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub → Actions

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install anthropic

      - name: 📝 Generar artículo del blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: 🚀 Commit y push del nuevo artículo
        run: |
          git config user.name "Clínicas Llenas Bot"
          git config user.email "bot@clinicasllenas.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto-blog: nuevo artículo $(date +'%Y-%m-%d')"
          git push
