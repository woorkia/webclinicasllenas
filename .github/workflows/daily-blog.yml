name: 📝 Auto-blog diario (5 artículos)

on:
  schedule:
    # 9:00 AM hora España (UTC+2 verano = 7:00 UTC / UTC+1 invierno = 8:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Lanzar manualmente desde GitHub → Actions → "Run workflow"

permissions:
  contents: write

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install anthropic

      - name: 📝 Generar 5 artículos del blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: 🚀 Commit y push de los nuevos artículos
        run: |
          git config user.name "Clínicas Llenas Bot"
          git config user.email "bot@clinicasllenas.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto-blog: 5 artículos nuevos $(date +'%Y-%m-%d')"
          git push

      - name: 🌐 Deploy en Coolify
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://178.104.153.116:8000/api/v1/deploy?uuid=sanm9l1o3x008mpron39jcs7&force=true" \
            && echo "✅ Deploy en Coolify disparado"
